{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card-ae p-4">
        <div class="text-center mb-4">
          <div style="width:64px;height:64px;background:rgba(26,86,219,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
            <i class="fas fa-user-plus fa-xl" style="color:var(--primary)"></i>
          </div>
          <h1 class="h4 fw-bold mb-1">Create Account</h1>
          <p class="text-muted small">Join AccessEase 2.0 today</p>
        </div>
        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
              <input type="text" id="name" name="name" class="form-control"
                     placeholder="Your full name" required autocomplete="name"
                     value="{{ request.form.get('name','') }}">
            </div>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" id="email" name="email" class="form-control"
                     placeholder="you@example.com" required autocomplete="email"
                     value="{{ request.form.get('email','') }}">
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="Min. 6 characters" required minlength="6">
              <button type="button" class="input-group-text bg-transparent"
                      onclick="togglePw('password')" style="cursor:pointer;border:1px solid #dee2e6;border-left:none;">
                <i class="fas fa-eye text-muted" id="pw-eye-password"></i>
              </button>
            </div>
            <div id="pw-strength" class="mt-1" style="font-size:0.75rem;"></div>
          </div>
          <div class="mb-4">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                     placeholder="Re-enter password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>
        <p class="text-center small mb-0">
          Already have an account? <a href="{{ url_for('login') }}" class="fw-bold">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePw(id) {
  const i = document.getElementById(id), e = document.getElementById('pw-eye-' + id);
  if (i.type === 'password') { i.type = 'text'; e.className = 'fas fa-eye-slash text-muted'; }
  else { i.type = 'password'; e.className = 'fas fa-eye text-muted'; }
}
document.getElementById('password').addEventListener('input', function() {
  const el = document.getElementById('pw-strength'), v = this.value;
  let s = 0;
  if (v.length >= 6) s++; if (/[A-Z]/.test(v)) s++; if (/[0-9]/.test(v)) s++; if (/[^A-Za-z0-9]/.test(v)) s++;
  const [msg, c] = s <= 1 ? ['Weak','var(--danger)'] : s === 2 ? ['Fair','var(--warning)'] : s === 3 ? ['Good','var(--info)'] : ['Strong','var(--success)'];
  el.innerHTML = v ? `<span style="color:${c};font-weight:600;">${msg} password</span>` : '';
});
</script>
{% endblock %}
