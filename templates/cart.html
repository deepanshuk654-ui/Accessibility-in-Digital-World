<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ElectroMart | Cart</title>
<link rel="stylesheet" href="{{ url_for('static', filename='accessease.css') }}">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f2f2;
    }

    /* Header */
    .header {
        background: #131921;
        color: white;
        padding: 12px 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .logo {
        font-size: 26px;
        font-weight: bold;
    }
    .search-bar {
        width: 50%;
        display: flex;
        background: white;
        border-radius: 4px;
        overflow: hidden;
    }
    .search-bar input {
        width: 90%;
        padding: 10px;
        border: none;
        outline: none;
        font-size: 16px;
    }
    .search-bar button {
        width: 10%;
        border: none;
        background: orange;
        font-size: 18px;
        cursor: pointer;
    }
    .header-right a {
        color: white;
        margin-left: 25px;
        text-decoration: none;
        font-size: 17px;
    }

    /* Cart Section */
    .cart-container {
        width: 80%;
        margin: auto;
        margin-top: 25px;
        background: white;
        padding: 20px;
        border-radius: 8px;
    }
    .cart-title {
        font-size: 26px;
        margin-bottom: 15px;
        font-weight: bold;
    }
    .cart-item {
        display: flex;
        border-bottom: 1px solid #ddd;
        padding: 15px 0;
    }
    .cart-item img {
        width: 120px;
        height: 120px;
        margin-right: 20px;
        border-radius: 6px;
    }
    .item-details {
        width: 60%;
    }
    .item-details h3 {
        margin: 0;
        font-size: 20px;
    }
    .item-details p {
        margin: 5px 0;
    }
    .qty-box {
        margin-top: 10px;
    }
    select {
        padding: 5px;
    }
    .price {
        font-size: 22px;
        font-weight: bold;
        color: #d9534f;
    }

    /* Right Summary Box */
    .summary-box {
        margin: 20px auto;
        display: inline-block;
        display: grid;
        width: 1200px;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 5px #ccc;
    }
    .summary-box h3 {
        font-size: 22px;
        margin-bottom: 10px;
    }
    .summary-box p {
        font-size: 17px;
        margin: 6px 0;
    }
    .checkout-btn {
        background: orange;
        border: none;
        padding: 12px;
        width: 100%;
        font-size: 18px;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }

    /* Footer */
    .footer {
        background: #131921;
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 40px;
    }
      
</style>
</head>
<body>

<!-- HEADER -->
  <header style="position:sticky;top:0;z-index:200; background:#232f3e; padding:12px 20px; color:white; display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center;">
      <h2 style="margin:0;">🛒ElectroMart</h2>
    </div>

    <div style="display:flex; width:40%; background:white; border-radius:4px; overflow:hidden;">
      <input type="text" placeholder="Search products..." 
             style="flex:1; padding:8px; border:none; outline:none;">
      <button style="background:#febd69; border:none; padding:8px 15px; cursor:pointer;">🔍</button>
    </div>

    <div>
      <a href="{{ url_for('signup') }}" style="color:white; margin-right:20px; text-decoration:none;">Login</a>
      <a href="{{ url_for('home') }}" style="color:white; margin-right:20px; text-decoration:none;">Home</a>
      <a href="{{ url_for('product') }}" style="color:white; margin-right:20px; text-decoration:none;">Products</a>
    
    </div>
  </header>

<!-- CART SECTION -->
<div class="cart-container">
    <div class="cart-title">Your Shopping Cart</div>

    <!-- Item 1 -->
    <div class="cart-item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMuaXViWIxKpStUahfzjx4GoVj70X8ZrmGQA&s">
        <div class="item-details">
            <h3>Samsung Galaxy A55 5G</h3>
            <p>Color: Iceblue | 8GB RAM | 128GB</p>
            <div class="qty-box">
                Qty:
                <select>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </div>
        </div>
        <div class="price">₹38,999</div>
    </div>

    <!-- Item 2 -->
    <div class="cart-item">
        <img src="https://media-ik.croma.com/prod/https://media.tatacroma.com/Croma%20Assets/Computers%20Peripherals/Laptop/Images/302221_0_qx8ym1.png?tr=w-600">
        <div class="item-details">
            <h3>HP 15s Laptop</h3>
            <p>Intel i5 | 16GB RAM | 512GB SSD</p>
            <div class="qty-box">
                Qty:
                <select>
                    <option>1</option>
                    <option>2</option>
                </select>
            </div>
        </div>
        <div class="price">₹52,499</div>
    </div>
</div>

<!-- SUMMARY BOX -->
<div class="summary-box">
    <h3>Order Summary</h3>
    <p>Items: 2</p>
    <p>Total Amount: <b>₹91,498</b></p>
   <a href="{{ url_for('checkout') }}"> <button class="checkout-btn">Proceed to Buy</button></a>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2025 ElectroMart | All Rights Reserved
</div>
  <!-- Accessibility Toolbar -->
<div id="accessibility-toolbar">
  <button onclick="readPage()" title="Read Page">🔊 Read</button>
  <button onclick="stopSpeak()" title="Stop Speaking">🛑 Stop</button>
  <button onclick="changeFontSize('increase')" title="Increase Font Size">A+</button>
  <button onclick="changeFontSize('decrease')" title="Decrease Font Size">A-</button>
  <button onclick="toggleHighContrast()" title="Toggle High Contrast">🌗 Contrast</button>
  <button onclick="startVoiceCommands()" title="Start Voice Commands">🎤 Voice</button>
  <button onclick="showSignLanguageHelp()" title="Show Sign Language Help">🤟 Sign</button>
</div>

<script>
    const FLASK_URLS = {
        home: "{{ url_for('home') }}",
        signup: "{{ url_for('signup') }}",
        admin: "{{ url_for('admin') }}",
        cart: "{{ url_for('cart') }}",
        checkout: "{{ url_for('checkout') }}",
        order: "{{ url_for('order') }}",
        track: "{{ url_for('track') }}",
        product: "{{ url_for('product') }}",
        mobile: "{{ url_for('mobile') }}",
        laptop: "{{ url_for('laptop') }}",
        watch: "{{ url_for('watch') }}",
        earbuds: "{{ url_for('earbuds') }}",
        speaker: "{{ url_for('speaker') }}"
    };
</script>

<script src="{{ url_for('static', filename='accessease.js') }}"></script>
</body>
</html>
