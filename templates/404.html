{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <div style="font-size:6rem;font-weight:900;color:var(--border);line-height:1;">404</div>
  <h2 class="fw-bold mt-3 mb-2">Page Not Found</h2>
  <p class="text-muted mb-4">Sorry, the page you're looking for doesn't exist or has been moved.</p>
  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{{ url_for('home') }}" class="btn btn-primary px-4"><i class="fas fa-home me-2"></i>Go Home</a>
    <a href="{{ url_for('products') }}" class="btn btn-outline-primary px-4"><i class="fas fa-shopping-bag me-2"></i>Browse Products</a>
  </div>
</div>
{% endblock %}
