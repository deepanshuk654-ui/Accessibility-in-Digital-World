<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - AccessEase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='accessease.css') }}">
</head>

<body style="font-family: Arial; background:#f1f3f6; margin:0;">

   <div style="background:#232f3e; padding:18px; color:white; 
            font-size:26px; font-weight:bold; 
            display:flex; justify-content:space-between; align-items:center;">

    <span>Login</span>

    <!-- Logout Button -->
    <a href="{{ url_for('logout') }}"
       style="background:#ff4d4d; color:white; padding:8px 15px; 
              text-decoration:none; border-radius:5px; font-size:16px;">
        Logout
    </a>
</div>


    <div style="
        width:380px; 
        margin:40px auto; 
        background:white; 
        padding:35px; 
        border-radius:10px; 
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    ">

        <h2 style="text-align:center; margin-bottom:20px;">Login</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div
            style="background:#d4edda; color:#155724; padding:10px; border-radius:5px; margin-bottom:15px; font-weight:bold;">
            {% for msg in messages %}
            {{ msg }}
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">

            <label style="font-weight:bold;">Email</label><br>
            <input type="email" name="email" required
                style="width:100%; padding:10px; margin:7px 0; border:1px solid #ccc; border-radius:5px;"
                placeholder="Enter your email">

            <label style="font-weight:bold;">Password</label><br>
            <input type="password" name="password" required
                style="width:100%; padding:10px; margin:7px 0; border:1px solid #ccc; border-radius:5px;"
                placeholder="Enter your password">

            <button type="submit"
                style="width:100%; padding:12px; background:#2874f0; color:white; border:none; border-radius:5px; margin-top:15px; cursor:pointer; font-size:16px;">
                Login
            </button>

        </form>

        <p style="text-align:center; margin-top:15px;">
            Don't have an account?
            <a href="{{ url_for('signup') }}" style="color:#2874f0; text-decoration:none;">Signup</a>
        </p>
    </div>

    <!-- Accessibility Toolbar -->
    <div id="accessibility-toolbar">
        <button onclick="readPage()" title="Read Page">🔊 Read</button>
        <button onclick="stopSpeak()" title="Stop Speaking">🛑 Stop</button>
        <button onclick="changeFontSize('increase')" title="Increase Font Size">A+</button>
        <button onclick="changeFontSize('decrease')" title="Decrease Font Size">A-</button>
        <button onclick="toggleHighContrast()" title="Toggle High Contrast">🌗 Contrast</button>
        <button onclick="startVoiceCommands()" title="Start Voice Commands">🎤 Voice</button>
        <button onclick="showSignLanguageHelp()" title="Show Sign Language Help">🤟 Sign</button>
    </div>

    <script>
        const FLASK_URLS = {
            home: "{{ url_for('home') }}",
            signup: "{{ url_for('signup') }}",
            admin: "{{ url_for('admin') }}",
            cart: "{{ url_for('cart') }}",
            checkout: "{{ url_for('checkout') }}",
            order: "{{ url_for('order') }}",
            track: "{{ url_for('track') }}",
            product: "{{ url_for('product') }}",
            mobile: "{{ url_for('mobile') }}",
            laptop: "{{ url_for('laptop') }}",
            watch: "{{ url_for('watch') }}",
            earbuds: "{{ url_for('earbuds') }}",
            speaker: "{{ url_for('speaker') }}"
        };
    </script>

    <script src="{{ url_for('static', filename='accessease.js') }}"></script>

</body>
</html>
