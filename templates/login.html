{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="card-ae p-4">
        <div class="text-center mb-4">
          <div style="width:64px;height:64px;background:rgba(26,86,219,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
            <i class="fas fa-sign-in-alt fa-xl" style="color:var(--primary)"></i>
          </div>
          <h1 class="h4 fw-bold mb-1">Welcome Back</h1>
          <p class="text-muted small">Sign in to your AccessEase account</p>
        </div>

        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" id="email" name="email" class="form-control"
                     placeholder="you@example.com" required autocomplete="email"
                     aria-required="true" aria-label="Email address">
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="Enter your password" required autocomplete="current-password"
                     aria-required="true" aria-label="Password">
              <button type="button" class="input-group-text bg-transparent border-start-0"
                      onclick="togglePw('password')" aria-label="Show/hide password" style="cursor:pointer;border:1px solid #dee2e6;border-left:none;">
                <i class="fas fa-eye text-muted" id="pw-eye-password"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-600 mb-3" aria-label="Login">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>

        <p class="text-center small mb-0">
          Don't have an account?
          <a href="{{ url_for('signup') }}" class="fw-600">Create one</a>
        </p>
      </div>

      <!-- Admin link -->
      <div class="text-center mt-3">
        <a href="{{ url_for('admin_login') }}" class="text-muted small">
          <i class="fas fa-shield-alt me-1"></i>Admin Login
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePw(id) {
  const inp = document.getElementById(id);
  const eye = document.getElementById('pw-eye-' + id);
  if (inp.type === 'password') { inp.type = 'text'; eye.className = 'fas fa-eye-slash text-muted'; }
  else { inp.type = 'password'; eye.className = 'fas fa-eye text-muted'; }
}
</script>
{% endblock %}
