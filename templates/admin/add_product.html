{% extends "admin/base.html" %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add New Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8">
    <div class="card-ae">
      <div class="card-header"><i class="fas fa-plus me-2 text-primary"></i>Add New Product</div>
      <div class="p-4">
        <form method="POST" novalidate>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Product Name *</label>
              <input type="text" name="name" class="form-control" required placeholder="Full product name">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Brand</label>
              <input type="text" name="brand" class="form-control" placeholder="e.g. Samsung, Apple, Sony">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Category</label>
              <select name="category_id" class="form-select">
                <option value="">Select Category</option>
                {% for cat in cats %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Selling Price (₹) *</label>
              <input type="number" name="price" class="form-control" required min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Original / MRP (₹)</label>
              <input type="number" name="original_price" class="form-control" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Stock Quantity</label>
              <input type="number" name="stock" class="form-control" min="0" value="0">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Featured Product?</label>
              <select name="is_featured" class="form-select">
                <option value="0">No</option>
                <option value="1">Yes — Show on homepage</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Main Image URL *</label>
              <input type="url" name="image_url" class="form-control" placeholder="https://…">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Image 2 URL</label>
              <input type="url" name="image2_url" class="form-control" placeholder="https://…">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Image 3 URL</label>
              <input type="url" name="image3_url" class="form-control" placeholder="https://…">
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="4" placeholder="Detailed product description…"></textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i>Add Product</button>
            <a href="{{ url_for('admin_products') }}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
