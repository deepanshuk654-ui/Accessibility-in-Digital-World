<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — AccessEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
    .form-control { background: #0f172a; border-color: #334155; color: #f1f5f9; border-radius: 8px; padding: 10px 14px; }
    .form-control:focus { background: #0f172a; border-color: #1a56db; color: #f1f5f9; box-shadow: 0 0 0 3px rgba(26,86,219,0.2); }
    .form-control::placeholder { color: #475569; }
    .form-label { color: #94a3b8; font-size: 0.85rem; font-weight: 600; }
    .btn-primary { background: #1a56db; border-color: #1a56db; font-weight: 600; border-radius: 8px; padding: 10px; }
    .btn-primary:hover { background: #1245b5; border-color: #1245b5; }
    .alert { border-radius: 8px; font-size: 0.88rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div style="width:60px;height:60px;background:rgba(26,86,219,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
        <i class="fas fa-shield-alt fa-xl" style="color:#1a56db;"></i>
      </div>
      <h4 style="color:#f1f5f9;font-weight:800;margin:0;">Admin Panel</h4>
      <p style="color:#475569;font-size:0.82rem;margin-top:4px;">AccessEase 2.0</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat == 'success' else 'danger' }} py-2 mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" novalidate>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:#0f172a;border-color:#334155;color:#475569;"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="admin" required autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:#0f172a;border-color:#334155;color:#475569;"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('home') }}" style="color:#475569;font-size:0.8rem;">← Back to Store</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
